name: Python Bindings

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            build_cmd: "zig build -Doptimize=ReleaseFast"
          - os: macos-latest
            build_cmd: "zig build -Doptimize=ReleaseFast"
          - os: windows-latest
            build_cmd: "zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu"
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Clear Zig Cache (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          if (Test-Path "$env:LOCALAPPDATA\zig") {
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\zig"
          }

      - name: Build QwD Shared Library
        run: ${{ matrix.build_cmd }}

      - name: Run Python Tests
        run: |
          python -m pip install --upgrade pip pytest
          pip install ./bindings/python
          pytest tests/bindings/
