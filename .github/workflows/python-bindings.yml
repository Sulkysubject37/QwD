name: Python Bindings

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            build_cmd: "zig build -Doptimize=ReleaseFast"
          - os: macos-latest
            shell: bash
            build_cmd: "zig build -Doptimize=ReleaseFast"
          - os: windows-latest
            shell: pwsh
            build_cmd: "zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install libdeflate (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev

      - name: Install libdeflate (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libdeflate

      - name: Clear Zig Cache (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          if (Test-Path "$env:LOCALAPPDATA\zig") {
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\zig"
          }

      - name: Toolchain Sanity Check (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          Set-Content -Path test.c -Value "int main() { return 0; }"
          zig cc -target x86_64-windows-gnu test.c -o test.exe

      - name: Build QwD Shared Library
        run: ${{ matrix.build_cmd }}

      - name: Run Python Tests
        run: |
          python -m pip install --upgrade pip pytest
          pip install ./bindings/python
          pytest tests/bindings/
