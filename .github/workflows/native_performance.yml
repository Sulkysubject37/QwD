name: QwD Native Performance (v1.3.0)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    name: Build & Verify (Linux/macOS)
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Zig
      uses: mlugg/setup-zig@v1
      with:
        version: 0.16.0-dev.3153+d6f43caad

    - name: Install Dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libdeflate-dev libasound2-dev libx11-dev libxcursor-dev libxi-dev libxinerama-dev libxrandr-dev python3-pip r-base

    - name: Install Dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install libdeflate python r

    - name: Build QwD CLI
      run: zig build -Doptimize=ReleaseFast

    - name: Verify CLI JSON Output
      run: |
        ./tools/gen_fastq.sh 10000 test.fastq || zig run tools/gen_fastq.zig -- 10000 test.fastq
        ./zig-out/bin/qwd test.fastq > report.json
        cat report.json
        grep "read_count" report.json

    - name: Verify Workstation Build
      run: zig build workstation_dummy -Doptimize=ReleaseSafe

    - name: Verify Python Bindings
      run: |
        python3 -m venv venv
        source venv/bin/activate
        pip install -e bindings/python
        python -c "import qwd; print('Python bindings installed successfully')"

    - name: Verify R Bindings
      run: |
        Rscript -e "install.packages('bindings/r', repos=NULL, type='source')"
        Rscript -e "library(qwd); print('R bindings installed successfully')"

    - name: Verify Swift UI Dashboard (macOS)
      if: runner.os == 'macOS'
      run: |
        cd apps/dashboard
        swift build
