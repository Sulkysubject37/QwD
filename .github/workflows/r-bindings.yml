name: R Bindings

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-r:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3

      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build QwD Shared Library (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Run R Tests
        run: |
          R CMD build bindings/r
          R CMD check qwd_*.tar.gz
