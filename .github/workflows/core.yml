name: QwD Core (Zig 0.16.0-dev)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'stages/**'
      - 'bindings/c/**'
      - 'build.zig'
      - '.github/workflows/core.yml'
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
        target: ["", "-Dtarget=x86_64-linux", "-Dtarget=aarch64-macos"]
        exclude:
          - os: ubuntu-latest
            target: "-Dtarget=aarch64-macos"
          - os: macos-latest
            target: "-Dtarget=x86_64-linux"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: "0.16.0"

      - name: Install libdeflate (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev

      - name: Install libdeflate (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libdeflate

      - name: Build Core
        run: zig build -Doptimize=ReleaseSafe ${{ matrix.target }}

      - name: Generate Test Data
        run: |
          mkdir -p tests/fixtures
          python3 scripts/gen_test_data.py --reads 1000000 --out tests/fixtures/sample.fastq
          ./zig-out/bin/qbgzip tests/fixtures/sample.fastq

      - name: Run Native Benchmark (1M reads)
        run: ./zig-out/bin/qwd qc tests/fixtures/sample.fastq.bgzf.gz --threads 4
