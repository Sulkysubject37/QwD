name: QwD Ecosystem (Bindings)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'bindings/**'
  pull_request:
    branches: [ main ]

jobs:
  test-python:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev
      - name: Install libdeflate (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev
      - name: Install libdeflate (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libdeflate
      - name: Build Shared Library
        run: zig build -Doptimize=ReleaseFast
      - name: Run Python Smoke Test
        run: |
          export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:$(pwd)/zig-out/lib
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/zig-out/lib
          python3 -c "import sys; sys.path.append('bindings/python'); import qwd; res = qwd.qc('tests/fixtures/sample.fastq', threads=2); print(res); exit(0 if 'read_count' in res else 1)"

  test-r:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v3
      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0-dev
      - name: Install libdeflate (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev
      - name: Install libdeflate (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libdeflate
      - name: Build Shared Library
        run: zig build -Doptimize=ReleaseFast
      - name: Run R Smoke Test
        run: |
          export DYLD_LIBRARY_PATH=$DYLD_LIBRARY_PATH:$(pwd)/zig-out/lib
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:$(pwd)/zig-out/lib
          Rscript -e "source('bindings/r/R/qwd.R'); res <- qwd_qc('tests/fixtures/sample.fastq', threads=2); print(res); if (!'read_count' %in% names(res)) stop('Missing read_count')"
