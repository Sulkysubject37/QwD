name: QwD CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build project (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Generate robust test fixtures
        run: |
          mkdir -p tests/fixtures
          python3 -c "import random; random.seed(42); f=open('tests/fixtures/sample.fastq','w'); [f.write(f'@R_{i}\nACGT\n+\nIIII\n') for i in range(100000)]; f.close()"
          python3 -c "f=open('tests/fixtures/sample.bam','w'); f.write('BAM HEADER'); f.close()"

      - name: Run unit tests
        run: zig build test --summary all

      - name: Run SIMD benchmark (Internal)
        run: zig build bench

      - name: Run Core benchmark (Internal)
        run: zig build bench-core

      - name: Multicore Correctness & Scaling (Phase R Extreme)
        shell: bash
        run: |
          echo "--- 1 Thread (Exact) ---"
          ./zig-out/bin/qwd qc tests/fixtures/sample.fastq --threads 1 > res_1t_exact.txt
          
          echo "--- 4 Threads (Exact) ---"
          ./zig-out/bin/qwd qc tests/fixtures/sample.fastq --threads 4 > res_4t_exact.txt
          
          echo "--- 8 Threads (Exact) ---"
          ./zig-out/bin/qwd qc tests/fixtures/sample.fastq --threads 8 > res_8t_exact.txt
          
          echo "Verifying Multicore Exact Determinism..."
          diff res_1t_exact.txt res_4t_exact.txt
          diff res_1t_exact.txt res_8t_exact.txt

      - name: Fast Mode (Probabilistic) Validation
        shell: bash
        run: |
          echo "--- 1 Thread (Fast) ---"
          ./zig-out/bin/qwd qc --fast tests/fixtures/sample.fastq --threads 1 > res_1t_fast.txt
          
          echo "--- 8 Threads (Fast) ---"
          ./zig-out/bin/qwd qc --fast tests/fixtures/sample.fastq --threads 8 > res_8t_fast.txt

      - name: Phase Q Memory Bounding
        shell: bash
        run: |
          echo "--- Testing 8 Threads with 16MB Hard Memory Cap ---"
          ./zig-out/bin/qwd qc tests/fixtures/sample.fastq --threads 8 --max-memory 16 > res_mem_bounded.txt
          echo "Verifying memory bounded exact determinism against unconstrained execution..."
          diff res_mem_bounded.txt res_1t_exact.txt

      - name: Interface Tests (Python & CLI)
        shell: bash
        run: |
          python3 tests/bindings/python_test.py
          ./tests/interface/cli_test.sh

      - name: R Package Build and Check
        shell: bash
        run: |
          if [ "${{ matrix.os }}" != "windows-latest" ]; then
            Rscript -e "install.packages('jsonlite', repos='https://cloud.r-project.org')"
            R CMD build bindings/r
            R CMD check qwd_*.tar.gz --no-manual --no-build-vignettes
          fi

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            res_*.txt
