name: QwD CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3



      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build project (ReleaseFast)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu
          else
            zig build -Doptimize=ReleaseFast
          fi

      - name: Generate robust test fixtures
        shell: bash
        run: |
          mkdir -p tests/fixtures
          python3 -c "import random; random.seed(42); f=open('tests/fixtures/sample.fastq','w'); [f.write(f'@R_{i}\nACGT\n+\nIIII\n') for i in range(100000)]; f.close()"
          python3 -c "f=open('tests/fixtures/sample.bam','w'); f.write('BAM HEADER'); f.close()"

      - name: Run unit tests
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            zig build test --summary all -Dtarget=x86_64-windows-gnu
          else
            zig build test --summary all
          fi

      - name: Run SIMD benchmark (Internal)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            zig build bench -Dtarget=x86_64-windows-gnu || echo "Benchmark not supported on Windows"
          else
            zig build bench
          fi

      - name: Run Core benchmark (Internal)
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            zig build bench-core -Dtarget=x86_64-windows-gnu || echo "Benchmark not supported on Windows"
          else
            zig build bench-core
          fi

      - name: Multicore Correctness & Scaling (Phase R Extreme)
        shell: bash
        run: |
          QWD="./zig-out/bin/qwd"
          if [ -f "${QWD}.exe" ]; then QWD="${QWD}.exe"; fi
          echo "--- 1 Thread (Exact) ---"
          $QWD qc tests/fixtures/sample.fastq --threads 1 > res_1t_exact.txt
          
          echo "--- 4 Threads (Exact) ---"
          $QWD qc tests/fixtures/sample.fastq --threads 4 > res_4t_exact.txt
          
          echo "--- 8 Threads (Exact) ---"
          $QWD qc tests/fixtures/sample.fastq --threads 8 > res_8t_exact.txt
          
          echo "Verifying Multicore Exact Determinism..."
          diff res_1t_exact.txt res_4t_exact.txt
          diff res_1t_exact.txt res_8t_exact.txt

      - name: Fast Mode (Probabilistic) Validation
        shell: bash
        run: |
          QWD="./zig-out/bin/qwd"
          if [ -f "${QWD}.exe" ]; then QWD="${QWD}.exe"; fi
          echo "--- 1 Thread (Fast) ---"
          $QWD qc --fast tests/fixtures/sample.fastq --threads 1 > res_1t_fast.txt
          
          echo "--- 8 Threads (Fast) ---"
          $QWD qc --fast tests/fixtures/sample.fastq --threads 8 > res_8t_fast.txt

      - name: Phase Q Memory Bounding
        shell: bash
        run: |
          QWD="./zig-out/bin/qwd"
          if [ -f "${QWD}.exe" ]; then QWD="${QWD}.exe"; fi
          echo "--- Testing 4 Threads with 128MB Hard Memory Cap ---"
          $QWD qc tests/fixtures/sample.fastq --threads 4 --max-memory 128 > res_mem_bounded.txt
          echo "Verifying memory bounded exact determinism against unconstrained execution..."
          diff res_mem_bounded.txt res_1t_exact.txt

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Interface Tests (Python & CLI)
        shell: bash
        run: |
          python3 tests/bindings/python_test.py
          ./tests/interface/cli_test.sh

      - name: Setup R
        if: matrix.os != 'windows-latest'
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        if: matrix.os != 'windows-latest'
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::jsonlite
          needs: check
          working-directory: bindings/r

      - name: R Package Build and Check
        if: matrix.os != 'windows-latest'
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bindings/r
          error-on: '"error"'

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            res_*.txt
