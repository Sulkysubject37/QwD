name: QwD CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            is_windows: false
            build_cmd: "zig build -Doptimize=ReleaseFast"
            test_cmd: "zig build test --summary all"
          - os: macos-latest
            shell: bash
            is_windows: false
            build_cmd: "zig build -Doptimize=ReleaseFast"
            test_cmd: "zig build test --summary all"
          - os: windows-latest
            shell: pwsh
            is_windows: true
            build_cmd: "zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu"
            test_cmd: "zig build test --summary all -Dtarget=x86_64-windows-gnu"
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install libdeflate (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libdeflate-dev

      - name: Install libdeflate (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install libdeflate

      - name: Clear Zig Cache (Windows)
        if: matrix.is_windows
        run: |
          if (Test-Path "$env:LOCALAPPDATA\zig") {
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\zig"
          }
          if (Test-Path "$env:USERPROFILE\.cache\zig") {
            Remove-Item -Recurse -Force "$env:USERPROFILE\.cache\zig"
          }

      - name: Toolchain Sanity Check (Windows)
        if: matrix.is_windows
        run: |
          Set-Content -Path test.c -Value "int main() { return 0; }"
          zig cc -target x86_64-windows-gnu test.c -o test.exe

      - name: Build project
        run: ${{ matrix.build_cmd }}

      - name: Generate robust test fixtures
        shell: bash
        run: |
          mkdir -p tests/fixtures
          python3 -c "import random; random.seed(42); f=open('tests/fixtures/sample.fastq','w'); [f.write(f'@R_{i}\nACGT\n+\nIIII\n') for i in range(100000)]; f.close()"
          python3 -c "f=open('tests/fixtures/sample.bam','w'); f.write('BAM HEADER'); f.close()"
          gzip -c tests/fixtures/sample.fastq > tests/fixtures/sample.fastq.gz

      - name: Run unit tests
        run: ${{ matrix.test_cmd }}

      - name: Multicore Correctness & Scaling (Unix)
        if: "!matrix.is_windows"
        run: |
          QWD="./zig-out/bin/qwd"
          $QWD qc tests/fixtures/sample.fastq --threads 1 > res_1t_exact.txt
          $QWD qc tests/fixtures/sample.fastq --threads 4 > res_4t_exact.txt
          $QWD qc tests/fixtures/sample.fastq --threads 8 > res_8t_exact.txt
          diff res_1t_exact.txt res_4t_exact.txt
          diff res_1t_exact.txt res_8t_exact.txt

      - name: GZIP Determinism & Mode Validation (Unix)
        if: "!matrix.is_windows"
        run: |
          QWD="./zig-out/bin/qwd"
          $QWD qc tests/fixtures/sample.fastq.gz --mode exact --threads 4 > res_gzip_exact.txt
          diff res_gzip_exact.txt res_1t_exact.txt
          $QWD qc tests/fixtures/sample.fastq.gz --mode approx --threads 4 > res_gzip_approx.txt

      - name: Multicore Correctness & Scaling (Windows)
        if: matrix.is_windows
        run: |
          $QWD = ".\zig-out\bin\qwd.exe"
          if (!(Test-Path $QWD)) { throw "Binary not found at $QWD" }
          & $QWD qc tests/fixtures/sample.fastq --threads 1 | Out-File -FilePath res_1t_exact.txt -Encoding utf8
          & $QWD qc tests/fixtures/sample.fastq --threads 4 | Out-File -FilePath res_4t_exact.txt -Encoding utf8
          & $QWD qc tests/fixtures/sample.fastq --threads 8 | Out-File -FilePath res_8t_exact.txt -Encoding utf8
          if (Compare-Object (Get-Content res_1t_exact.txt) (Get-Content res_4t_exact.txt)) { throw "Determinism failed (1t vs 4t)" }
          if (Compare-Object (Get-Content res_1t_exact.txt) (Get-Content res_8t_exact.txt)) { throw "Determinism failed (1t vs 8t)" }

      - name: Approx Mode Validation (Unix)
        if: "!matrix.is_windows"
        run: |
          QWD="./zig-out/bin/qwd"
          $QWD qc tests/fixtures/sample.fastq --mode approx --threads 1 > res_1t_approx.txt
          $QWD qc tests/fixtures/sample.fastq --mode approx --threads 8 > res_8t_approx.txt

      - name: Approx Mode Validation (Windows)
        if: matrix.is_windows
        run: |
          $QWD = ".\zig-out\bin\qwd.exe"
          & $QWD qc tests/fixtures/sample.fastq --mode approx --threads 1 | Out-File -FilePath res_1t_approx.txt -Encoding utf8
          & $QWD qc tests/fixtures/sample.fastq --mode approx --threads 8 | Out-File -FilePath res_8t_approx.txt -Encoding utf8

      - name: Phase Q Memory Bounding (Unix)
        if: "!matrix.is_windows"
        run: |
          QWD="./zig-out/bin/qwd"
          $QWD qc tests/fixtures/sample.fastq --threads 4 --max-memory 128 > res_mem_bounded.txt
          diff res_mem_bounded.txt res_1t_exact.txt

      - name: Phase Q Memory Bounding (Windows)
        if: matrix.is_windows
        run: |
          $QWD = ".\zig-out\bin\qwd.exe"
          & $QWD qc tests/fixtures/sample.fastq --threads 4 --max-memory 128 | Out-File -FilePath res_mem_bounded.txt -Encoding utf8
          if (Compare-Object (Get-Content res_mem_bounded.txt) (Get-Content res_1t_exact.txt)) { throw "Memory bounded determinism failed" }

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Interface Tests (Python & CLI)
        run: |
          python3 tests/bindings/python_test.py
          bash ./tests/interface/cli_test.sh

      - name: Setup R
        if: "!matrix.is_windows"
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install R dependencies
        if: "!matrix.is_windows"
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck, any::jsonlite
          needs: check
          working-directory: bindings/r

      - name: R Package Build and Check
        if: "!matrix.is_windows"
        uses: r-lib/actions/check-r-package@v2
        with:
          working-directory: bindings/r
          error-on: '"error"'

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            res_*.txt
