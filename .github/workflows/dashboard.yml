name: QwD Dashboard (macOS)

on:
  push:
    branches: [ main ]
    paths:
      - 'core/**'
      - 'bindings/c/**'
      - 'apps/dashboard/**'
      - '.github/workflows/dashboard.yml'
  pull_request:
    branches: [ main ]

jobs:
  build-dashboard:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: master

      - name: Install libdeflate
        run: brew install libdeflate

      - name: Build QwD Dylib
        run: zig build -Doptimize=ReleaseFast

      - name: Build Swift Dashboard
        run: |
          cd apps/dashboard
          swift build
          echo "Dashboard Built and Linked Successfully"
