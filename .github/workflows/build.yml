name: QwD CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build_and_test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v3

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Build project
        run: zig build

      - name: Generate robust test fixtures
        run: |
          mkdir -p tests/fixtures
          python3 -c "import random; random.seed(42); f=open('tests/fixtures/sample.fastq','w'); [f.write(f'@R_{i}\nACGT\n+\nIIII\n') for i in range(100000)]; f.close()"
          python3 -c "f=open('tests/fixtures/sample.bam','w'); f.write('BAM HEADER'); f.close()"

      - name: Run unit tests
        run: zig build test --summary all

      - name: Run SIMD benchmark (Internal)
        run: zig build bench

      - name: Run Core benchmark (Internal)
        run: zig build bench-core

      - name: FASTQ Reproducibility & Performance (Scalar vs SIMD, Single vs Multi)
        shell: bash
        run: |
          echo "--- FASTQ: Single-core, SIMD ---"
          ./zig-out/bin/qwd qc tests/fixtures/sample.fastq > run_s_simd.txt
          
          echo "--- FASTQ: Single-core, Scalar ---"
          ./zig-out/bin/qwd qc --no-simd tests/fixtures/sample.fastq > run_s_scalar.txt
          
          echo "--- FASTQ: Multi-core (4 threads), SIMD ---"
          ./zig-out/bin/qwd qc --threads 4 tests/fixtures/sample.fastq > run_m_simd.txt
          
          echo "Verifying FASTQ reproducibility..."
          diff run_s_simd.txt run_s_scalar.txt
          diff run_s_simd.txt run_m_simd.txt

      - name: BAM Reproducibility & Performance
        shell: bash
        run: |
          echo "--- BAM: Alignment Stats ---"
          ./zig-out/bin/qwd bamstats tests/fixtures/sample.bam > bam_run1.txt
          ./zig-out/bin/qwd bamstats tests/fixtures/sample.bam > bam_run2.txt
          
          echo "Verifying BAM reproducibility..."
          diff bam_run1.txt bam_run2.txt

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            run_s_simd.txt
            run_s_scalar.txt
            run_m_simd.txt
            bam_run1.txt
            bam_run2.txt
