name: Windows Debug Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  debug-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Zig (0.13.0)
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Zig Environment Check
        run: |
          zig version
          zig env

      - name: Clear Zig Cache
        shell: pwsh
        run: |
          if (Test-Path "$env:LOCALAPPDATA\zig") {
            Remove-Item -Recurse -Force "$env:LOCALAPPDATA\zig"
            echo "Cleared Zig cache"
          }

      - name: Sanity Check (zig cc)
        run: |
          # Try to compile a trivial C file targeting GNU to see if import libs are generated
          echo "int main() { return 0; }" > test.c
          zig cc -target x86_64-windows-gnu test.c -o test.exe

      - name: Build Project (GNU)
        run: zig build -Doptimize=ReleaseFast -Dtarget=x86_64-windows-gnu --summary all
